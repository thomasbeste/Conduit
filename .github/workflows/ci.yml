name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for MinVer

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Conduit.slnx

      - name: Build
        run: dotnet build Conduit.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Conduit.slnx --no-build --configuration Release --verbosity normal
